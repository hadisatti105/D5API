<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicare Lead Form</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 520px;
  background: #111827;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h2 {
  text-align: center;
  color: #38bdf8;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0b1220;
  color: white;
  outline: none;
}

input:focus {
  border-color: #38bdf8;
}

button {
  width: 100%;
  padding: 12px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  color: #0f172a;
}

button:hover {
  background: #0ea5e9;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #94a3b8;
}

pre {
  margin-top: 15px;
  background: #0b1220;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  max-height: 260px;
  overflow: auto;
  border: 1px solid #334155;
}
</style>
</head>

<body>

<div class="container">
  <h2>Medicare Lead Form</h2>

  <form id="leadForm">

    <input type="text" id="first_name" placeholder="First Name" required>
    <input type="text" id="last_name" placeholder="Last Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="text" id="caller_id" placeholder="Phone Number" required>
    <input type="text" id="state" placeholder="State (e.g. MD)" required>

    <button type="submit">Submit Lead</button>
  </form>

  <div class="status" id="status"></div>
  <pre id="output"></pre>
</div>

<script>
const form = document.getElementById("leadForm");
const statusEl = document.getElementById("status");
const output = document.getElementById("output");

/**
 * Normalize phone for TrackDrive (CRITICAL FIX)
 */
function normalizePhone(phone) {
  return phone.replace(/\D/g, "");
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  statusEl.innerText = "Submitting lead...";
  output.textContent = "";

  const lead = {
    first_name: document.getElementById("first_name").value,
    last_name: document.getElementById("last_name").value,
    email: document.getElementById("email").value,
    caller_id: normalizePhone(document.getElementById("caller_id").value),
    state: document.getElementById("state").value
  };

  try {
    const res = await fetch("/submit-lead", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(lead)
    });

    const data = await res.json();

    if (data.success) {
      statusEl.innerText = "Lead Accepted ✅";
    } else {
      statusEl.innerText = "Lead Rejected ❌";
    }

    output.textContent = JSON.stringify(data, null, 2);

  } catch (err) {
    statusEl.innerText = "Server Error ❌";
    output.textContent = err.message;
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicare Lead Form</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  width: 100%;
  max-width: 520px;
  background: #111827;
  padding: 25px;
  border-radius: 12px;
}

h2 {
  text-align: center;
  color: #38bdf8;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #38bdf8;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0ea5e9;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 13px;
  color: #94a3b8;
}

pre {
  margin-top: 15px;
  background: #0b1220;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  max-height: 260px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="card">
  <h2>Medicare Lead Form</h2>

  <form id="leadForm">
    <input id="first_name" placeholder="First Name" required>
    <input id="last_name" placeholder="Last Name">
    <input id="email" placeholder="Email">
    <input id="caller_id" placeholder="Phone Number" required>
    <input id="state" placeholder="State">

    <button type="submit">Submit Lead</button>
  </form>

  <div class="status" id="status"></div>
  <pre id="output"></pre>
</div>

<script>
const form = document.getElementById("leadForm");
const statusEl = document.getElementById("status");
const output = document.getElementById("output");

function normalizePhone(phone) {
  return phone.replace(/\D/g, "");
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  statusEl.innerText = "Submitting...";
  output.textContent = "";

  const lead = {
    first_name: document.getElementById("first_name").value,
    last_name: document.getElementById("last_name").value,
    email: document.getElementById("email").value,
    caller_id: normalizePhone(document.getElementById("caller_id").value),
    state: document.getElementById("state").value
  };

  try {
    const res = await fetch("/submit-lead", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(lead)
    });

    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      statusEl.innerText = "Invalid server response";
      output.textContent = text;
      return;
    }

    statusEl.innerText = data.success ? "Lead Accepted ✅" : "Lead Rejected ❌";
    output.textContent = JSON.stringify(data, null, 2);

  } catch (err) {
    statusEl.innerText = "Request failed";
    output.textContent = err.message;
  }
});
</script>

</body>
</html>
